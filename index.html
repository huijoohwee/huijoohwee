<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singabldr</title>

    <!--
      Root entrypoint for airvio.co
      We redirect to the canonical Cloudflare Pages app path to avoid duplicating the full engine HTML
      (which would otherwise drift and break relative asset/script paths).
    -->
    <meta http-equiv="refresh" content="0; url=/content/singabldr/" />
    <link rel="canonical" href="/content/singabldr/" />

    <script>
      // JS redirect (keeps query params like ?mode=ai&board=... intact)
      (function redirectToSingabldr() {
        const target = new URL("/content/singabldr/", window.location.origin);
        const current = new URL(window.location.href);
        target.search = current.search;
        target.hash = current.hash;
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <noscript>
      <a href="/content/singabldr/">Open Singabldr</a>
    </noscript>
  </body>
</html>
