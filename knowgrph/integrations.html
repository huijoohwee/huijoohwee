<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowgrph Integrations</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji"; margin: 0; background: #0b1220; color: #e5e7eb; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
      h1 { font-size: 18px; margin: 0 0 10px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px; }
      .card h2 { font-size: 14px; margin: 0 0 10px; color: #c7d2fe; }
      label { display: block; font-size: 12px; opacity: 0.9; margin: 8px 0 4px; }
      input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.25); color: #e5e7eb; }
      textarea { min-height: 96px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
      .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      button { padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.16); background: rgba(99,102,241,0.22); color: #e5e7eb; cursor: pointer; }
      button:hover { background: rgba(99,102,241,0.32); }
      pre { white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px; margin: 10px 0 0; }
      .span { grid-column: 1 / -1; }
      .muted { font-size: 12px; opacity: 0.85; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>DeerFlow + MiroFish integration tester (same-origin)</h1>
      <div class="row">
        <div class="card">
          <h2>Generic Request</h2>
          <label>Path (same-origin)</label>
          <input id="path" value="/api/deerflow/health" />
          <label>Method</label>
          <select id="method">
            <option>GET</option>
            <option>POST</option>
            <option>HEAD</option>
          </select>
          <label>JSON body (for POST)</label>
          <textarea id="body">{}</textarea>
          <div class="btns">
            <button id="send">Send</button>
            <button id="clear">Clear output</button>
          </div>
          <pre id="out">Ready.</pre>
        </div>

        <div class="card">
          <h2>Presets</h2>
          <label>Simulation ID</label>
          <input id="simId" placeholder="sim_xxxx" />
          <label>Platform</label>
          <select id="platform">
            <option value="parallel">parallel</option>
            <option value="reddit">reddit</option>
            <option value="twitter">twitter</option>
          </select>
          <div class="btns">
            <button id="dfHealth">DeerFlow: /health</button>
            <button id="mfStart">MiroFish: start</button>
            <button id="mfStop">MiroFish: stop</button>
            <button id="mfStream">MiroFish: stream (SSE)</button>
            <button id="mfStreamStop">Stop SSE</button>
          </div>

          <label>Chat proxy</label>
          <input id="chatProvider" value="deerflow" />
          <label>OpenAI key (only if provider=openai)</label>
          <input id="chatKey" placeholder="sk-..." />
          <label>Prompt</label>
          <textarea id="chatPrompt">Say hello.</textarea>
          <div class="btns">
            <button id="chatSend">POST /__chat_proxy/v1/chat/completions</button>
          </div>
          <div class="muted">MiroFish routes via `/api/mirofish/*` → DeerFlow upstream. Chat routes via `/__chat_proxy/*`.</div>
        </div>

        <div class="card span">
          <h2>SSE Output</h2>
          <pre id="sse">(not connected)</pre>
        </div>
      </div>
    </div>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      const out = $('out');
      const sseOut = $('sse');
      let es = null;

      function setOut(value) {
        out.textContent = String(value ?? '');
      }

      function appendSse(line) {
        const next = `${sseOut.textContent}\n${line}`.trim();
        sseOut.textContent = next.slice(-50_000);
      }

      async function send(path, method, body, { headers = {} } = {}) {
        const init = { method, headers: { ...headers } };
        if (method === 'POST') {
          init.headers['content-type'] = 'application/json';
          init.body = JSON.stringify(body ?? {});
        }
        const res = await fetch(path, init);
        const txt = await res.text();
        return { status: res.status, ok: res.ok, text: txt, headers: Object.fromEntries(res.headers.entries()) };
      }

      $('send').addEventListener('click', async () => {
        const path = $('path').value.trim();
        const method = $('method').value;
        const bodyRaw = $('body').value.trim();
        let body = undefined;
        try {
          body = bodyRaw ? JSON.parse(bodyRaw) : undefined;
        } catch {
          setOut('Invalid JSON body');
          return;
        }
        try {
          const res = await send(path, method, body);
          setOut(JSON.stringify(res, null, 2));
        } catch (e) {
          setOut(String(e?.message || e));
        }
      });

      $('clear').addEventListener('click', () => setOut('Cleared.'));

      $('dfHealth').addEventListener('click', async () => {
        $('path').value = '/api/deerflow/health';
        $('method').value = 'GET';
        $('body').value = '{}';
        $('send').click();
      });

      function buildMirofishUrl(action) {
        const simId = $('simId').value.trim();
        const platform = $('platform').value;
        if (!simId) throw new Error('Missing simulation id');
        const qs = new URLSearchParams();
        if (platform) qs.set('platform', platform);
        if (action === 'start') qs.set('force', 'true');
        const base = `/api/mirofish/simulations/${encodeURIComponent(simId)}/${action}`;
        const suffix = qs.toString();
        return suffix ? `${base}?${suffix}` : base;
      }

      $('mfStart').addEventListener('click', async () => {
        try {
          const url = buildMirofishUrl('start');
          $('path').value = url;
          $('method').value = 'POST';
          $('body').value = '{}';
          $('send').click();
        } catch (e) {
          setOut(String(e?.message || e));
        }
      });

      $('mfStop').addEventListener('click', async () => {
        try {
          const url = buildMirofishUrl('stop');
          $('path').value = url;
          $('method').value = 'POST';
          $('body').value = '{}';
          $('send').click();
        } catch (e) {
          setOut(String(e?.message || e));
        }
      });

      $('mfStream').addEventListener('click', () => {
        try {
          const simId = $('simId').value.trim();
          const platform = $('platform').value;
          if (!simId) throw new Error('Missing simulation id');
          const qs = new URLSearchParams();
          if (platform) qs.set('platform', platform);
          const url = `/api/mirofish/simulations/${encodeURIComponent(simId)}/stream?${qs.toString()}`;
          if (es) es.close();
          sseOut.textContent = `(connecting) ${url}`;
          es = new EventSource(url);
          es.onmessage = (ev) => appendSse(ev.data);
          es.onerror = () => appendSse('[error] EventSource disconnected');
        } catch (e) {
          setOut(String(e?.message || e));
        }
      });

      $('mfStreamStop').addEventListener('click', () => {
        if (es) es.close();
        es = null;
        sseOut.textContent = '(not connected)';
      });

      $('chatSend').addEventListener('click', async () => {
        const provider = $('chatProvider').value.trim();
        const key = $('chatKey').value.trim();
        const prompt = $('chatPrompt').value.trim();
        const payload = {
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: 'You are a helpful assistant.' },
            { role: 'user', content: prompt || 'Say hello.' },
          ],
          stream: false,
        };
        const headers = {
          'x-kg-chat-provider': provider,
        };
        if (key) headers['x-kg-chat-api-key'] = key;
        try {
          const res = await send('/__chat_proxy/v1/chat/completions', 'POST', payload, { headers });
          setOut(JSON.stringify(res, null, 2));
        } catch (e) {
          setOut(String(e?.message || e));
        }
      });
    </script>
  </body>
</html>
